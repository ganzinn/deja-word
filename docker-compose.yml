services:
  db:
    image: postgres:18-alpine
    container_name: deja-word-db
    environment:
      POSTGRES_USER: dejaword
      POSTGRES_PASSWORD: dejaword
      POSTGRES_DB: dejaword
    ports:
      - "5432:5432"
    volumes:
      - dejaword_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dejaword -d dejaword"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dejaword_pgdata:
